{% extends "base.html" %}
{% block title %} — New Order{% endblock %}
{% block content %}
<div style="max-width:600px;margin:0 auto">
<div class="page-header">
  <div>
    <div class="page-title">Place new order</div>
    <div class="page-meta" style="margin-top:0.2rem">Customer intake form</div>
  </div>
</div>

<form method="POST" class="card">
  <div style="font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:1rem">Customer</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
    <div class="form-group"><label>Name</label><input type="text" name="customer_name" required/></div>
    <div class="form-group"><label>Phone</label><input type="text" name="customer_phone" placeholder="+91..."/></div>
  </div>
  <div class="form-group"><label>Email</label><input type="email" name="customer_email"/></div>

  <div style="font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin:1.25rem 0 1rem">Source</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
    <div class="form-group">
      <label>Order source</label>
      <select name="source"><option>website</option><option>store</option><option>marketplace</option></select>
    </div>
    <div class="form-group">
      <label>Store location</label>
      <select name="store_location"><option>Bangalore HQ</option><option>Mumbai</option><option>Delhi</option><option>Chennai</option></select>
    </div>
  </div>

  <div style="font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin:1.25rem 0 1rem">Lens spec</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem">
    <div class="form-group"><label>SPH (power)</label><input type="number" step="0.25" name="power_sph" required placeholder="-2.50"/></div>
    <div class="form-group"><label>CYL</label><input type="number" step="0.25" name="power_cyl" value="0" placeholder="0"/></div>
    <div class="form-group">
      <label>Index</label>
      <select name="index" required>
        <option value="1.50">1.50</option><option value="1.56">1.56</option><option value="1.60">1.60</option>
        <option value="1.67">1.67</option><option value="1.74">1.74</option>
      </select>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem">
    <div class="form-group">
      <label>Coating</label>
      <select name="coating"><option value="none">None</option><option value="AR">Anti-reflective</option><option value="blue-cut">Blue cut</option><option value="photochromic">Photochromic</option></select>
    </div>
    <div class="form-group">
      <label>Material</label>
      <select name="material"><option>CR-39</option><option>poly</option><option>trivex</option><option>high-index</option></select>
    </div>
    <div class="form-group">
      <label>Lens type</label>
      <select name="lens_type"><option value="single-vision">Single vision</option><option value="bifocal">Bifocal</option><option value="progressive">Progressive</option></select>
    </div>
  </div>
  <div class="form-group">
    <label>Frame model</label>
    <select name="frame_model">
      <option value="">— Select frame —</option>
      <option>Lumio Aria</option>
      <option>Lumio Steel</option>
      <option>Lumio Verve</option>
      <option>Lumio Pulse</option>
      <option>Lumio Noir</option>
      <option>Lumio Crest</option>
      <option>Lumio Sport</option>
      <option>Lumio Sundowner</option>
    </select>
  </div>

  <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem">Place order</button>
</form>
</div>
{% endblock %}
