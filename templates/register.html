{% extends "base.html" %}
{% block content %}
<div style="max-width:380px;margin:8vh auto;text-align:center">
  <div style="font-family:var(--mono);font-size:1.4rem;font-weight:500;letter-spacing:0.06em;margin-bottom:0.4rem">EYEWEAR<span style="color:var(--accent)">·</span>OMS</div>
  <div style="font-size:0.78rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2rem">Create account</div>
  <div class="card" style="text-align:left">
    <form method="POST">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" required autofocus/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required minlength="6"/>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select name="role" required>
          <option value="ops">Operations</option>
          <option value="lab">Lab</option>
          <option value="qc">Quality Control</option>
          <option value="dispatch">Dispatch</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Register</button>
    </form>
    <div style="margin-top:1rem;font-size:0.78rem;color:var(--text-dim);text-align:center">
      Have an account? <a href="{{ url_for('login') }}" style="color:var(--accent)">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
